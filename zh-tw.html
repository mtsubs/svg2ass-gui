<!doctype html>
<html lang="zh-TW">
<meta charset="utf-8">
<title>svg2ass-gui</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="lib/plume-all.css">
<link rel="stylesheet" href="lib/main.css">

<div class="plume app">
  <h1>svg2ass-gui</h1>
  <p>為 <a href="https://github.com/irrwahn/svg2ass">svg2ass</a> 提供的網頁版圖形介面。</p>
  <div class="pm-ground split s2">
    <div class="pm-field">
      <label for="dataInput">SVG</label>
      <textarea id="dataInput"></textarea>
    </div>
    <div class="pm-field">
      <label for="dataOutput">ASS</label>
      <textarea id="dataOutput"></textarea>
    </div>
  </div>
  <div class="pm-ground split s2">
    <div class="pm-field">
      <label for="startTime">開始時間</label>
      <input id="startTime" value="0:00:00.00">
    </div>
    <div class="pm-field">
      <label for="endTime">結束時間</label>
      <input id="endTime" value="0:00:01.00">
    </div>
  </div>
  <div class="pm-ground">
    <div>
      <span class="pm-input-file pm-btn-secondary">
        <span id="openFileMsg">開啟檔案</span>
        <input type="file" id="openFile">
      </span>
      <button id="advancedBtn" class="pm-btn-light">進階設定</button>
      <button id="convertBtn" class="pm-btn-primary pull-right">轉換</button>
    </div>
  </div>

  <div class="pm-is-hidden" id="advancedPanel">
    <div class="pm-ground split s3">
      <div class="pm-field">
        <label for="actor">說話者</label>
        <input id="actor" value="Sign">
      </div>
      <div class="pm-field">
        <label for="style">樣式</label>
        <input id="style" value="Default">
      </div>
      <div class="pm-field">
        <label for="layer">初始階層</label>
        <input id="layer" value="0">
      </div>
    </div>
    <div class="pm-ground split s3">
      <div class="pm-field">
        <label for="epsilon">Epsilon</label>
        <input id="epsilon" value="0.001">
      </div>
      <div class="pm-field">
        <label for="precision">
          數值精確度
          <span class="inline-block">(0 到 5 之間)</span>
        </label>
        <input id="precision" value="1" min="0" max="5" type="number">
      </div>
      <div class="pm-field">
        <label for="arcline">曲線擬合</label>
        <input id="arcline" value="4">
      </div>
    </div>
    <div class="pm-ground split s3">
      <div class="pm-field">
        <label for="svgo">使用 SVGO 壓縮 SVG</label>
        <select id="svgo">
          <option value="0">不使用 SVGO</option>
          <option selected value="1">僅修復相容性</option>
          <option value="2">輕度壓縮</option>
          <option value="3">中度壓縮</option>
          <option value="4">重度壓縮 (可能導致破圖)</option>
        </select>
      </div>
      <div class="pm-field">
        <label for="scale">繪圖比例 (實驗性)</label>
        <select id="scale">
          <option selected value="1">1:1 (\p1)</option>
          <option value="2">1:2 (\p2)</option>
          <option value="3">1:4 (\p3)</option>
          <option value="4">1:8 (\p4)</option>
        </select>
      </div>
      <div class="pm-field">
        <label for="pos">加入 \pos(0,0)?</label>
        <select id="pos">
          <option value="0">否</option>
          <option selected value="1">是</option>
        </select>
      </div>
    </div>
    <p>欲了解上述設定的更多資訊，請閱讀 <a href="https://github.com/irrwahn/svg2ass/blob/53be678a5be24d690b421bce5f1e345ae960077c/main.c#L1181-L1205">svg2ass 說明文件</a>。</p>
  </div>

  <hr>
  <p class="languages"></p>

  <a href="https://github.com/qgustavor/svg2ass-gui" class="github-corner" aria-label="在 GitHub 上查看此專案"><svg width="80" height="80" viewBox="0 0 250 250" style="fill:#151513;color:#fff; position:absolute;top:0;border:0;right:0" aria-hidden="true"><path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path><path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path><path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path></svg></a><style>.github-corner:hover .octo-arm{animation:octocat-wave 560ms ease-in-out}@keyframes octocat-wave{0%,100%{transform:rotate(0)}20%,60%{transform:rotate(-25deg)}40%,80%{transform:rotate(10deg)}}@media (max-width:500px){.github-corner:hover .octo-arm{animation:none}.github-corner .octo-arm{animation:octocat-wave 560ms ease-in-out}}</style>
</div>

<script type="application/json" id="messages">{
"convertionError": "轉換時發生錯誤。",
"dropHere": "拖曳至此處",
"copied": "已複製上述文字。請將其貼上至 Aegisub 或其他編輯器中。",
"copy": "請複製上述文字並貼上至 Aegisub 或其他編輯器中。"
}</script>

<script src="lib/main.js"></script>
